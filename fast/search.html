<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Search Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Marked.js (Markdown) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- KaTeX (数式) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <style>
    /* ── Reset ───────────────────────────────────────────────── */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }

    .container {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border-radius: 999px;
      border: 1px solid #ddd;
      margin-bottom: 30px;
      outline: none;
    }

    .search-box:focus {
      border-color: #888;
    }

    /* ── AI Answer box ───────────────────────────────────────── */
    .ai-answer {
      padding: 24px;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      margin-bottom: 20px;
      background: #fafafa;
      position: relative;
    }

    .ai-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
    }

    /* Markdown content inside AI answer */
    .ai-prose {
      font-size: 15px;
      line-height: 1.8;
      color: #222;
    }

    .ai-prose h1,
    .ai-prose h2,
    .ai-prose h3 {
      font-weight: 700;
      margin: .9em 0 .4em;
      color: #111;
    }

    .ai-prose h1 {
      font-size: 1.35em
    }

    .ai-prose h2 {
      font-size: 1.15em
    }

    .ai-prose h3 {
      font-size: 1em
    }

    .ai-prose p {
      margin: .5em 0;
    }

    .ai-prose ul,
    .ai-prose ol {
      padding-left: 1.4em;
      margin: .4em 0;
    }

    .ai-prose li {
      margin: .2em 0;
    }

    .ai-prose blockquote {
      border-left: 3px solid #ddd;
      margin: .8em 0;
      padding: .3em .9em;
      color: #555;
      background: #f5f5f5;
      border-radius: 0 6px 6px 0;
    }

    .ai-prose code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: .1em .35em;
      font-size: .88em;
    }

    .ai-prose pre {
      background: #1e1e2e;
      border-radius: 8px;
      padding: 14px 18px;
      overflow-x: auto;
      margin: .8em 0;
    }

    .ai-prose pre code {
      background: none;
      border: none;
      padding: 0;
      color: #cdd6f4;
      font-size: .87em;
    }

    /* Collapse wrapper: clamp to ~10 lines */
    .ai-collapse-wrap {
      position: relative;
      overflow: hidden;
      /* 10行 ≈ 10 × 1.8 × 15px = 270px */
      max-height: 270px;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ai-collapse-wrap.expanded {
      max-height: 9999px;
    }

    /* Fade gradient at the bottom when collapsed */
    .ai-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: linear-gradient(transparent, #fafafa);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .ai-collapse-wrap.expanded+.ai-fade {
      opacity: 0;
    }

    /* ── AI Answer footer (expand btn + AI btn) ─────────────── */
    .ai-footer {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }

    /* Shared style for expand and AI buttons */
    .ai-expand-btn,
    .ai-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      background: #f7f7f7;
      color: #333;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      box-sizing: border-box;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .ai-expand-btn:hover,
    .ai-btn:hover {
      background: #ececec;
      border-color: #ccc;
    }

    /* Ask AI button (no-results) */
    .ask-ai-wrap {
      text-align: center;
      padding: 24px 0 8px;
    }

    /* ── Result list items ───────────────────────────────────── */
    .result {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.15s ease;
      margin: 0 -16px;
    }

    .result:hover {
      background: #f5f5f5;
    }

    .result-title {
      font-size: 17px;
      color: #1a0dab;
      margin-bottom: 3px;
    }

    .result-desc {
      font-size: 14px;
      color: #444;
    }

    .result-hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    mark {
      background: #fff3a0;
    }

    /* ── Back link ───────────────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
      margin-bottom: 20px;
      padding: 4px 0;
      transition: color 0.15s ease;
    }

    .back-link:hover {
      color: #333;
    }

    /* ── Related items ───────────────────────────────────────── */
    .related-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }

    .related-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
    }

    .related-card {
      padding: 12px 14px;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .related-card:hover {
      background: #f5f5f5;
      border-color: #ddd;
    }

    .related-card-title {
      font-size: 15px;
      color: #1a0dab;
      margin-bottom: 3px;
    }

    .related-card-desc {
      font-size: 13px;
      color: #555;
    }

    /* ── Modal (detail view) ─────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      background: #fff;
      z-index: 200;
      display: none;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      border-radius: 12px;
      transition:
        top 0.48s cubic-bezier(0.4, 0, 0.2, 1),
        left 0.48s cubic-bezier(0.4, 0, 0.2, 1),
        width 0.48s cubic-bezier(0.4, 0, 0.2, 1),
        height 0.48s cubic-bezier(0.4, 0, 0.2, 1),
        border-radius 0.48s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: top, left, width, height, border-radius;
    }

    #modal-overlay.fullscreen {
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      border-radius: 0 !important;
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      gap: 12px;
    }

    #modal-title {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      color: #111;
      margin: 0;
      flex: 1;
      min-width: 0;
    }

    #close-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      padding: 6px;
      border-radius: 50%;
      line-height: 0;
      transition: background 0.15s ease, color 0.15s ease;
    }

    #close-btn:hover {
      background: #f0f0f0;
      color: #333;
    }

    /* flex-grow のみでは overflow-y:auto が発動しない問題を修正 */
    #modal-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px 20px 60px;
      opacity: 0;
      transition: opacity 0.3s ease;
      overscroll-behavior: contain;
    }

    /* ── Prose (Markdown content) ────────────────────────────── */
    .prose {
      max-width: 680px;
      margin: 0 auto;
      line-height: 1.8;
      color: #222;
      font-size: 16px;
    }

    .prose h1,
    .prose h2,
    .prose h3 {
      font-weight: 700;
      margin: 1.4em 0 0.5em;
      color: #111;
    }

    .prose h1 {
      font-size: 1.6em;
    }

    .prose h2 {
      font-size: 1.35em;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }

    .prose h3 {
      font-size: 1.15em;
    }

    .prose p {
      margin: 0.8em 0;
    }

    .prose ul,
    .prose ol {
      padding-left: 1.5em;
      margin: 0.6em 0;
    }

    .prose li {
      margin: 0.3em 0;
    }

    .prose blockquote {
      border-left: 4px solid #ddd;
      margin: 1em 0;
      padding: 0.4em 1em;
      color: #555;
      background: #fafafa;
      border-radius: 0 6px 6px 0;
    }

    .prose code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-size: 0.9em;
    }

    .prose pre {
      background: #1e1e2e;
      border-radius: 10px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 1em 0;
    }

    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      color: #cdd6f4;
      font-size: 0.88em;
    }

    .prose a {
      color: #1a0dab;
    }

    .prose hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 1.5em 0;
    }

    /* ── KaTeX math wrappers ─────────────────────────────────── */
    .math-inline {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      padding: 0.05em 0.3em;
      margin: 0 0.1em;
      display: inline-block;
    }

    .math-block {
      display: block;
      overflow-x: auto;
      padding: 12px 16px;
      margin: 1em 0;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      text-align: center;
    }

    .katex {
      font-size: 1.05em;
      color: inherit;
    }

    /* ── Streaming cursor ────────────────────────────────────── */
    .cursor-blink {
      display: inline-block;
      width: 7px;
      height: 1.15em;
      background: #3b82f6;
      vertical-align: middle;
      margin-left: 3px;
      animation: cur-blink 1s step-end infinite;
    }

    @keyframes cur-blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── Backdrop ────────────────────────────────────────────── */
    #backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 190;
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #backdrop.visible {
      opacity: 1;
    }

  </style>
</head>

<body>

  <!-- ══ Backdrop ══════════════════════════════════════════════════ -->
  <div id="backdrop"></div>

  <!-- ══ Detail Modal ══════════════════════════════════════════════ -->
  <div id="modal-overlay">
    <div id="modal-header">
      <h2 id="modal-title"></h2>
      <button id="close-btn" aria-label="閉じる">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div id="modal-body">
      <div class="prose" id="modal-content"></div>
      <div id="modal-related"></div>
    </div>
  </div>


  <!-- ══ Search Results ════════════════════════════════════════════ -->
  <div id="app">
    <div class="container">
      <a href="https://legrs.github.io/physics_notes/fast/index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        トップへ
      </a>
      <input id="search" class="search-box" type="text" placeholder="Search...">
      <div id="ai"></div>
      <div id="results"></div>
    </div>
  </div>

  <!-- ══ Modal + Search Logic ══════════════════════════════════════ -->
  <script>
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ── 数式変換（KaTeX） ── $$...$$ ブロック → $...$ インライン の順に処理 */
    function formatMath(text) {
      // CommonMark の right-flanking delimiter 制約への対応:
      // closing ** の直前が記号（）など punctuation）で直後が平仮名・片仮名・漢字の場合、
      // marked.js が bold を認識しないため、** の直後にスペースを挿入する。
      text = text.replace(
        /(\*\*[^*\n]*?[!-\/:-@\[-`{-~\uFF01-\uFF60\u3000-\u303F])\*\*(?=[\u3040-\u30FF\u4E00-\u9FFF])/g,
        '$1** '
      );
      // ブロック数式 $$...$$
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
        try {
          if (typeof katex === 'undefined') return _;
          return '<div class="math-block">' + katex.renderToString(expr.trim(), { throwOnError: false, displayMode: true }) + '</div>';
        } catch (e) { return _; }
      });
      // インライン数式 $...$（改行を含まない）
      text = text.replace(/\$([^$\n]+?)\$/g, (_, expr) => {
        try {
          if (typeof katex === 'undefined') return _;
          return '<span class="math-inline">' + katex.renderToString(expr, { throwOnError: false }) + '</span>';
        } catch (e) { return _; }
      });
      return text;
    }

    /* ── モーダル制御 ────────────────────────────────────────────── */
    const modalOverlay = document.getElementById('modal-overlay');
    const modalHeader = document.getElementById('modal-header');
    const modalBody = document.getElementById('modal-body');
    const modalTitle = document.getElementById('modal-title');
    const modalContent = document.getElementById('modal-content');
    const modalRelated = document.getElementById('modal-related');
    const closeBtn = document.getElementById('close-btn');
    const backdrop = document.getElementById('backdrop');

    let isStreaming = false, streamTimer = null, isUserScrolling = false;
    let allData = null; // fetch後にキャッシュ

    modalBody.addEventListener('wheel', () => { if (isStreaming) isUserScrolling = true; }, { passive: true });
    modalBody.addEventListener('touchstart', () => { if (isStreaming) isUserScrolling = true; }, { passive: true });
    modalBody.addEventListener('scroll', () => {
      if (!isStreaming) return;
      const dist = modalBody.scrollHeight - modalBody.clientHeight - modalBody.scrollTop;
      if (dist <= 10) isUserScrolling = false;
    });

    /* 関連項目セクションを描画 */
    function renderRelated(item) {
      modalRelated.innerHTML = '';
      if (!item.related || item.related.length === 0 || !allData) return;
      const relItems = item.related.map(id => allData.find(d => d.id === id)).filter(Boolean);
      if (relItems.length === 0) return;

      const section = document.createElement('div');
      section.className = 'related-section';
      section.innerHTML = `<div class="related-label">関連項目</div>`;

      relItems.forEach(ri => {
        const card = document.createElement('div');
        card.className = 'related-card';
        card.innerHTML = `
          <div class="related-card-title">${ri.questions[0]}</div>
          <div class="related-card-desc">${ri.description}</div>
        `;
        card.addEventListener('click', () => {
          stopStreaming();
          modalTitle.textContent = ri.questions[0];
          modalContent.innerHTML = '';
          modalRelated.innerHTML = '';
          modalBody.scrollTop = 0;
          isUserScrolling = false;
          startStreaming(ri.answer, () => renderRelated(ri));
        });
        section.appendChild(card);
      });
      modalRelated.appendChild(section);
    }

    function openModal(triggerEl, item) {
      document.body.style.overflow = 'hidden';
      isUserScrolling = false;

      const rect = triggerEl.getBoundingClientRect();
      modalOverlay.style.cssText = `
    display: flex;
    top: ${rect.top}px;
    left: ${rect.left}px;
    width: ${rect.width}px;
    height: ${rect.height}px;
  `;

      modalTitle.textContent = item.questions[0];
      modalContent.innerHTML = '';
      modalRelated.innerHTML = '';
      modalHeader.style.opacity = '0';
      modalBody.style.opacity = '0';

      backdrop.style.display = 'block';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          backdrop.classList.add('visible');
          modalOverlay.classList.add('fullscreen');
        });
      });

      setTimeout(() => {
        modalHeader.style.opacity = '1';
        modalBody.style.opacity = '1';
        startStreaming(item.answer, () => renderRelated(item));
      }, 500);
    }

    function closeModal() {
      stopStreaming();
      document.body.style.overflow = '';
      modalHeader.style.opacity = '0';
      modalBody.style.opacity = '0';
      backdrop.classList.remove('visible');
      modalOverlay.classList.remove('fullscreen');

      setTimeout(() => {
        modalOverlay.style.display = 'none';
        setTimeout(() => { backdrop.style.display = 'none'; }, 200);
      }, 500);
    }

    /* onComplete コールバックを追加 */
    function startStreaming(fullText, onComplete) {
      isStreaming = true;

      if (reduceMotion) {
        // 行単位で表示
        const lines = fullText.split('\n');
        let lineIdx = 0, buf = '';
        function tickReduced() {
          if (!isStreaming) return;
          if (lineIdx < lines.length) {
            buf += (lineIdx > 0 ? '\n' : '') + lines[lineIdx++];
            modalContent.innerHTML = marked.parse(formatMath(buf));
            if (!isUserScrolling) modalBody.scrollTop = modalBody.scrollHeight;
            streamTimer = setTimeout(tickReduced, 60);
          } else {
            modalContent.innerHTML = marked.parse(formatMath(fullText));
            isStreaming = false;
            if (onComplete) onComplete();
          }
        }
        tickReduced();
        return;
      }

      let idx = 0, buf = '';
      function tick() {
        if (!isStreaming) return;
        if (idx < fullText.length) {
          const chunk = Math.floor(Math.random() * 3) + 1;
          buf += fullText.slice(idx, idx + chunk);
          idx += chunk;

          modalContent.innerHTML = marked.parse(formatMath(buf)) + '<span class="cursor-blink"></span>';

          if (!isUserScrolling) modalBody.scrollTop = modalBody.scrollHeight;

          streamTimer = setTimeout(tick, Math.random() * 20 + 8);
        } else {
          modalContent.innerHTML = marked.parse(formatMath(fullText));
          isStreaming = false;
          if (onComplete) onComplete();
        }
      }
      tick();
    }

    function stopStreaming() {
      isStreaming = false;
      if (streamTimer) clearTimeout(streamTimer);
    }

    closeBtn.addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && modalOverlay.style.display !== 'none') closeModal();
    });

    // アニメーションなし：即座に検索結果を表示
    startSearchResults();

    /* ── 検索ロジック ────────────────────────────────────────────── */
    function startSearchResults() {
      // URLSearchParams.get() は + をスペースに変換するため、生のパラメータを直接デコードする
      const rawParam = (location.search.match(/[?&]q=([^&]*)/) || ['', ''])[1];
      const query = decodeURIComponent(rawParam).toLowerCase();

      const input = document.getElementById('search');
      const aiBox = document.getElementById('ai');
      const resultsBox = document.getElementById('results');

      input.value = query;

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.isComposing) {
          const q = input.value.trim();
          if (!q) return;
          const newSearch = `?q=${encodeURIComponent(q)}`;
          if (location.search === newSearch) {
            location.reload();
          } else {
            location.href = `https://legrs.github.io/physics_notes/fast/search.html${newSearch}`;
          }
        }
      });

      function highlight(text, words) {
        let r = text;
        words.forEach(w => { r = r.replace(new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark>$1</mark>'); });
        return r;
      }

      function levenshtein(a, b) {
        const m = Array.from({ length: b.length + 1 }, (_, i) => [i]);
        for (let j = 0; j <= a.length; j++) m[0][j] = j;
        for (let i = 1; i <= b.length; i++)
          for (let j = 1; j <= a.length; j++)
            m[i][j] = b[i - 1] === a[j - 1] ? m[i - 1][j - 1] : Math.min(m[i - 1][j - 1] + 1, m[i][j - 1] + 1, m[i - 1][j] + 1);
        return m[b.length][a.length];
      }
      function typoScore(word, text) {
        let best = Infinity;
        text.split(' ').forEach(t => { const d = levenshtein(word, t); if (d < best) best = d; });
        return best === 1 ? 2 : best === 2 ? 1 : 0;
      }
      function ngramScore(word, text) {
        let s = 0;
        for (let i = 0; i < word.length - 1; i++) if (text.includes(word.slice(i, i + 2))) s += 0.5;
        return s;
      }

      let cachedIndex = null;
      function buildIndex(data) {
        const idx = {};
        data.forEach(item => item.search_text.split(' ').forEach(w => {
          if (!idx[w]) idx[w] = new Set(); idx[w].add(item.id);
        }));
        return idx;
      }
      function getCandidates(idx, data, words) {
        const ids = new Set();
        words.forEach(w => idx[w]?.forEach(id => ids.add(id)));
        return ids.size === 0 ? data : data.filter(item => ids.has(item.id));
      }

      fetch('https://legrs.github.io/physics_notes/q_and_a_data.json', { cache: 'no-cache' })
        .then(r => r.json())
        .then(data => {
          if (!cachedIndex) cachedIndex = buildIndex(data);
          allData = data; // モーダルの関連項目用にキャッシュ
          const words = query.split(' ').filter(Boolean);
          const results = getCandidates(cachedIndex, data, words)
            .map(item => {
              let score = 0;
              if (item.questions.some(q => q.toLowerCase() === query)) score += 10;
              if (item.search_text.includes(query)) score += 5;
              item.questions.forEach(q => { if (q.toLowerCase().includes(query)) score += 3; });
              words.forEach(w => {
                if (item.search_text.includes(w)) score += 1;
                score += typoScore(w, item.search_text);
                score += ngramScore(w, item.search_text);
              });
              item.synonyms?.forEach(s => words.forEach(w => { if (s.includes(w)) score += 2; }));
              return { ...item, score: score * (item.priority || 1) };
            })
            .filter(i => i.score > 0)
            .sort((a, b) => b.score - a.score);

          aiBox.innerHTML = '';
          resultsBox.innerHTML = '';

          if (results.length === 0) {
            resultsBox.innerHTML = `
              <p style="color:#888;padding:20px 0">結果が見つかりませんでした。</p>
              <div class="ask-ai-wrap">
                <button class="ai-btn" id="ask-ai-btn">Ask AI ↗</button>
              </div>`;
            document.getElementById('ask-ai-btn').addEventListener('click', () => {
              window.open('https://chatgpt.com/?q=' + encodeURIComponent(query), '_blank', 'noopener');
            });
            return;
          }

          // ── AI Answer（1位の回答をストリーミング表示） ──────────
          const top = results[0];
          aiBox.innerHTML = `
        <div class="ai-answer">
          <div class="ai-label">AI Answer</div>
          <div class="ai-collapse-wrap" id="ai-collapse">
            <div class="ai-prose" id="ai-prose"></div>
          </div>
          <div class="ai-fade" id="ai-fade" style="display:none"></div>
          <div class="ai-footer">
            <button class="ai-expand-btn" id="ai-expand-btn" style="display:none">続きを読む ▾</button>
            <button class="ai-btn" id="dive-deeper-btn">Dive Deeper ↗</button>
          </div>
        </div>
      `;
          document.getElementById('dive-deeper-btn').addEventListener('click', () => {
            window.open('https://chatgpt.com/?q=' + encodeURIComponent(query), '_blank', 'noopener');
          });

          const aiProse = document.getElementById('ai-prose');
          const aiCollapse = document.getElementById('ai-collapse');
          const aiFade = document.getElementById('ai-fade');
          const aiExpandBtn = document.getElementById('ai-expand-btn');

          const LINE_HEIGHT = 15 * 1.8;
          const THRESHOLD = LINE_HEIGHT * 10; // ≈270px
          let overflowShown = false;

          function checkOverflow() {
            if (overflowShown) return;
            if (aiProse.scrollHeight > THRESHOLD + 4) {
              overflowShown = true;
              aiFade.style.display = 'block';
              aiExpandBtn.style.display = 'block';
            }
          }

          // expand / collapse トグル
          let aiExpanded = false;
          aiExpandBtn.addEventListener('click', () => {
            aiExpanded = !aiExpanded;
            aiCollapse.classList.toggle('expanded', aiExpanded);
            aiFade.style.opacity = aiExpanded ? '0' : '1';
            aiExpandBtn.textContent = aiExpanded ? '折りたたむ ▴' : '続きを読む ▾';
          });

          // ストリーミング
          let aiStreamTimer = null;
          let aiBuf = '', aiIdx = 0;
          const fullText = top.answer;

          function aiTick() {
            if (aiIdx < fullText.length) {
              const chunk = Math.floor(Math.random() * 3) + 1;
              aiBuf += fullText.slice(aiIdx, aiIdx + chunk);
              aiIdx += chunk;
              aiProse.innerHTML = marked.parse(formatMath(aiBuf)) + '<span class="cursor-blink"></span>';
              checkOverflow();
              aiStreamTimer = setTimeout(aiTick, Math.random() * 20 + 8);
            } else {
              aiProse.innerHTML = marked.parse(formatMath(fullText));
              checkOverflow();
            }
          }

          // prefers-reduced-motion: 行単位で表示
          function aiTickReduced() {
            const lines = fullText.split('\n');
            let lineIdx = 0, acc = '';
            function nextLine() {
              if (lineIdx >= lines.length) {
                aiProse.innerHTML = marked.parse(formatMath(fullText));
                checkOverflow();
                return;
              }
              acc += (lineIdx > 0 ? '\n' : '') + lines[lineIdx++];
              aiProse.innerHTML = marked.parse(formatMath(acc));
              checkOverflow();
              aiStreamTimer = setTimeout(nextLine, 60);
            }
            nextLine();
          }

          reduceMotion ? aiTickReduced() : aiTick();

          // ── 検索結果リスト ───────────────────────────────────────
          results.forEach(item => {
            const el = document.createElement('div');
            el.className = 'result';
            el.innerHTML = `
          <div class="result-title">${highlight(item.questions[0], words)}</div>
          <div class="result-desc">${highlight(item.description, words)}</div>
          <div class="result-hint">クリックして詳細を見る →</div>
        `;
            el.addEventListener('click', () => openModal(el, item));
            resultsBox.appendChild(el);
          });
        });
    }
  </script>

</body>
