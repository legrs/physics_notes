# 一時的な診断用ワークフロー。Xcode 26.5 で clang_rt.osx がどこにあるか
# （そもそも存在するか）を素早く確認するためだけのもの。調査が終わったら削除する。
name: tmp-xcode-diag

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: macos-15
    steps:
      - name: Inspect Xcode 26.5 clang_rt layout
        run: |
          echo "--- xcode-select -p ---"
          xcode-select -p
          echo "--- clang --version (default) ---"
          clang --version
          echo "--- Xcode 26.5 clang dirs ---"
          ls -la /Applications/Xcode_26.5.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/ 2>&1
          echo "--- find libclang_rt.osx* anywhere under Xcode_26.5.app ---"
          find /Applications/Xcode_26.5.app -iname "*clang_rt.osx*" 2>&1
          echo "--- find libclang_rt* anywhere under Xcode_26.5.app (broader) ---"
          find /Applications/Xcode_26.5.app -iname "*clang_rt*" 2>&1 | head -40
          echo "--- compare: CommandLineTools clang dirs (known-good baseline) ---"
          ls -la /Library/Developer/CommandLineTools/usr/lib/clang/ 2>&1
