name: Build JSON

# q_and_a_data.json が push されたときだけ動く
# （ビルドスクリプト自身の変更でも動かしたい場合は scripts/build.js を追加）
on:
  push:
    paths:
      - 'q_and_a_data.json'
      - 'scripts/build.js'
  workflow_dispatch: # 手動実行ボタンも有効化

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # コミット・プッシュに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate search_text
        run: node scripts/build.js

      - name: Commit updated JSON
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add q_and_a_data.json
          # 変更がなければスキップ（終了コード 0 を保つ）
          git diff --staged --quiet \
            && echo "変更なし。コミットをスキップします。" \
            || git commit -m 'chore: auto-generate search_text [skip ci]'
          git push