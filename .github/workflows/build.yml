name: Build JSON

on:
  push:
    paths:
      - 'q_and_a_data.json'
      - 'scripts/build.js'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Ensure HuggingFace cache directory exists
        run: mkdir -p ~/.cache/huggingface/transformers-js

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/transformers-js
          key: hf-models-${{ runner.os }}-e5
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate search_text and embeddings
        run: node scripts/build.js --embed

      - name: Generate dirlens.txt
        run: |
          OUTPUT=$(./node_modules/.bin/dirlens -G)
          printf '%s\n' "$OUTPUT" > dirlens.txt

      - name: Commit updated files
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add q_and_a_data.json embeddings.json version.json dirlens.txt || true
          git diff --staged --quiet \
            && echo "変更なし。コミットをスキップします。" \
            || git commit -m 'chore: auto-generate search_text and embeddings [skip ci]'
          git push