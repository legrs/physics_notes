name: Build JSON

on:
  push:
    paths:
      - 'q_and_a_data.json'
      - 'scripts/build.js'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'          # node_modules をキャッシュして高速化

      - name: Install dependencies
        run: npm ci

      - name: Generate search_text
        run: node scripts/build.js

      - name: Commit updated JSON
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add q_and_a_data.json
          git diff --staged --quiet \
            && echo "変更なし。コミットをスキップします。" \
            || git commit -m 'chore: auto-generate search_text [skip ci]'
          git push