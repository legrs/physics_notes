name: Build JSON

on:
  push:
    paths:
      - 'q_and_a_data.json'
      - 'scripts/build.js'
      - 'package.json'
  workflow_dispatch:
    inputs:
      embed:
        description: 'Embeddingも生成する'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate search_text and embeddings
        run: node scripts/build.js --embed

      - name: Commit updated files
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add q_and_a_data.json embeddings.json || true
          git diff --staged --quiet \
            && echo "変更なし。コミットをスキップします。" \
            || git commit -m 'chore: auto-generate search_text and embeddings [skip ci]'
          git push