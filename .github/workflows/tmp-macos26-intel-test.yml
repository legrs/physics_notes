# 一時的な検証用ワークフロー。macos-26-intel（Intel Mac 専用ランナー）で
# x86_64-apple-darwin 向けに physq がビルドできるかを確認するためだけのもの。
# 過去の調査では ort crate（ONNX Runtime バインディング）の dist.txt に
# x86_64-apple-darwin 向け配布が一切無いことを確認済みだが、実機でも確認する。
# 確認が終わったら削除する。
name: tmp-macos26-intel-test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26-intel
    steps:
      - name: Xcode info
        run: |
          xcode-select -p
          clang --version
          uname -m
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Build (release)
        working-directory: physq
        run: cargo build --release --target x86_64-apple-darwin
