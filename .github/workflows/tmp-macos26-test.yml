# 一時的な検証用ワークフロー。macos-26（専用イメージ、macos-15/macos-latestの
# 移行期混在イメージではない）で physq が Xcode 選択の回避策なしにそのまま
# ビルドできるかを確認するためだけのもの。確認が終わったら削除する。
name: tmp-macos26-test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Xcode info
        run: |
          xcode-select -p
          clang --version
          ls -d /Applications/Xcode*.app 2>&1
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build (release, no Xcode workaround)
        working-directory: physq
        run: cargo build --release --target aarch64-apple-darwin
