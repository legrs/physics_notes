# physq（Physics Notes 検索 CLI）のリリースビルド。
#
# 自動トリガーは無し（GitHub Release はまだ運用開始していないため）。
# GitHub → Actions → このワークフロー → Run workflow のボタン操作でのみ実行する:
#   1. 4 ターゲットの release バイナリをビルド（各 OS のネイティブ runner。
#      Intel Mac は ort crate が対応していないため対象外 — 下記コメント参照）
#   2. アーカイブ（tar.gz / zip）を作成
#   3. GitHub Release（draft）を作成し、タグ（physq-vX.Y.Z）とバイナリを添付
#      （タグを事前に push 済みならそれを使う。無ければこの実行時点の main に打つ）
#
# タグを physq-v* にしているのは、同一リポジトリの他リリース（将来の
# physics-notes 本体など）とタグ空間が衝突しないようにするため。
name: physq-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "確認用バージョン（例: 0.1.0）。physq/Cargo.toml の値と一致しないと失敗する。空欄なら確認をスキップ"
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest / macos-15 は現在 macOS 26 への移行期間中
          # （2026-06-15〜、あと約10日で完了予定）の混在イメージを引くことがあり、
          # そちらでは Xcode 26.5 の usr/lib/clang/ 以下が不完全で
          # `ld: library 'clang_rt.osx' not found` になることを確認した。
          # 専用の macos-26 イメージ（移行対象ではない）では Xcode 26.5 が
          # 正常に一式揃っており、回避策なしでビルドできることを実機確認済み。
          - target: aarch64-apple-darwin
            os: macos-26
            rustflags: ""
          # x86_64-apple-darwin（Intel Mac）は対象外: ort crate（ONNX Runtime
          # バインディング）が dist.txt に x86_64-apple-darwin 向けの配布を
          # 一切持っておらず、"ort does not provide prebuilt binaries for the
          # target `x86_64-apple-darwin`" で必ず失敗する。ONNX Runtime を
          # ソースからビルドする以外に回避策が無いため見送り。
          #
          # ort がダウンロードするプリビルド ONNX Runtime は glibc >= 2.38
          # (__isoc23_strtol 等の ISO C23 版シンボルを要求) でビルドされており、
          # ubuntu-22.04 の glibc 2.35 ではリンクできない
          # ("ld.lld: error: undefined symbol: __isoc23_strtol" で確認済み)。
          # ubuntu-24.04 系 (glibc 2.39) に上げて解決する。結果として physq の
          # Linux バイナリは glibc >= 2.38 系のディストリ（Ubuntu 24.04+/
          # Debian 13+/Fedora 39+ 等）が実行時に必要（README に明記）。
          # lld への切り替え自体は必須ではないが、埋め込み IPADIC 辞書由来の
          # 巨大なオブジェクトを GNU ld より高速にリンクできるため維持する。
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            rustflags: "-C link-arg=-fuse-ld=lld"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            rustflags: "-C link-arg=-fuse-ld=lld"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            rustflags: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Gotcha: rust-cache's key doesn't account for the macOS Xcode/SDK in
      # use, only OS+arch+Cargo.lock. A build that only changes CI-side
      # toolchain selection (not Cargo.lock) can silently reuse a cached
      # link-step fingerprint pointing at a since-removed Xcode path,
      # failing with "ld: library 'clang_rt.osx' not found" for an SDK that
      # isn't even the one this job selected. Bump `key` if that happens.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: physq
      - name: Install lld (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y lld
      - name: Build (release)
        working-directory: physq
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Collect
        run: |
          mkdir -p out/${{ matrix.target }}
          exe=physq; [[ "${{ matrix.target }}" == *windows* ]] && exe=physq.exe
          cp "physq/target/${{ matrix.target }}/release/$exe" "out/${{ matrix.target }}/"
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: out/

  assemble:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release create に必要(既定の GITHUB_TOKEN は read-only)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          merge-multiple: true
          path: binaries
      - name: Resolve version
        id: ver
        run: |
          v="$(grep -m1 '^version' physq/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "$v" ]; then
            echo "::error::physq/Cargo.toml の version ($v) と入力値 (${{ github.event.inputs.version }}) が一致しません。先に Cargo.toml を更新してください。"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Archive binaries for GitHub Release
        run: |
          # human-facing archives (physq-<version>-<triple>.{tar.gz,zip}) plus
          # unarchived per-target binaries (physq-bin-<triple>[.exe]) that
          # `physq update` fetches directly — no tar/zip decoding needed
          # client-side. checksums.txt covers only the latter.
          mkdir -p release
          for t in binaries/*/; do
            t="${t%/}"; triple="$(basename "$t")"
            name="physq-${{ steps.ver.outputs.version }}-$triple"
            if [ -f "$t/physq.exe" ]; then
              (cd "$t" && zip -q "../../release/$name.zip" physq.exe)
              cp "$t/physq.exe" "release/physq-bin-$triple.exe"
            else
              chmod +x "$t/physq"
              tar -czf "release/$name.tar.gz" -C "$t" physq
              cp "$t/physq" "release/physq-bin-$triple"
              chmod +x "release/physq-bin-$triple"
            fi
          done
          (cd release && sha256sum physq-bin-* > checksums.txt)
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # タグ physq-v${version} が既に push 済みならそれを使い、無ければこの実行時点の
          # コミットに新規作成する(gh release create の標準動作)。
          # version に "-" を含む場合（例: 0.1.2-rc1）は prerelease としてマークする。
          # physq update 自体は tag の semver を直接パースして stable/beta を判定するので
          # この --prerelease フラグには依存しないが、GitHub UI 上の表示を正しくするため。
          prerelease_flag=()
          [[ "${{ steps.ver.outputs.version }}" == *-* ]] && prerelease_flag=(--prerelease)
          gh release create "physq-v${{ steps.ver.outputs.version }}" --draft \
            --title "physq v${{ steps.ver.outputs.version }}" \
            "${prerelease_flag[@]}" \
            release/*
