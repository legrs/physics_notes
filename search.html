<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .container {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 999px;
            border: 1px solid #ddd;
            margin-bottom: 30px;
        }

        /* AI回答 */
        .ai-answer {
            padding: 24px;
            border: 1px solid #eee;
            border-radius: 16px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .ai-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .ai-text {
            font-size: 18px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* 関連 */
        .related span {
            color: #1a0dab;
            cursor: pointer;
            margin-right: 10px;
        }

        /* 検索結果 */
        .result {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .result-title {
            font-size: 18px;
            color: #1a0dab;
        }

        .result-desc {
            font-size: 14px;
            color: #444;
        }

        mark {
            background: #fff3a0;
        }
    </style>
</head>

<body>

    <div class="container">
        <input id="search" class="search-box" type="text">
        <div id="ai"></div>
        <div id="results"></div>
    </div>

    <script>
        // ===== URL =====
        const params = new URLSearchParams(location.search);
        const query = (params.get("q") || "").toLowerCase();

        const input = document.getElementById("search");
        const aiBox = document.getElementById("ai");
        const resultsBox = document.getElementById("results");

        input.value = query;

        // Enter検索
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const q = input.value.trim();
                if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
            }
        });

        // ===== ハイライト =====
        function highlight(text, words) {
            let result = text;
            words.forEach(word => {
                const regex = new RegExp(`(${word})`, "gi");
                result = result.replace(regex, "<mark>$1</mark>");
            });
            return result;
        }

        // ===== タイピングアニメーション =====
        function typeText(element, text) {
            element.textContent = "";
            let i = 0;

            function loop() {
                if (i < text.length) {
                    element.textContent += text[i];
                    i++;
                    setTimeout(loop, 25);
                }
            }
            loop();
        }

        // ===== 編集距離 =====
        function levenshtein(a, b) {
            const m = [];
            for (let i = 0; i <= b.length; i++) m[i] = [i];
            for (let j = 0; j <= a.length; j++) m[0][j] = j;

            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    m[i][j] = b[i - 1] === a[j - 1]
                        ? m[i - 1][j - 1]
                        : Math.min(
                            m[i - 1][j - 1] + 1,
                            m[i][j - 1] + 1,
                            m[i - 1][j] + 1
                        );
                }
            }
            return m[b.length][a.length];
        }

        function typoScore(word, text) {
            let best = Infinity;
            text.split(" ").forEach(t => {
                const d = levenshtein(word, t);
                if (d < best) best = d;
            });

            if (best === 1) return 2;
            if (best === 2) return 1;
            return 0;
        }

        // ===== n-gram（部分一致強化）=====
        function ngramScore(word, text) {
            const grams = [];
            for (let i = 0; i < word.length - 1; i++) {
                grams.push(word.slice(i, i + 2));
            }

            let score = 0;
            grams.forEach(g => {
                if (text.includes(g)) score += 0.5;
            });

            return score;
        }

        // ===== インデックス（キャッシュ対応）=====
        let cachedIndex = null;

        function buildIndex(data) {
            const index = {};
            data.forEach(item => {
                item.search_text.split(" ").forEach(word => {
                    if (!index[word]) index[word] = new Set();
                    index[word].add(item.id);
                });
            });
            return index;
        }

        function getCandidates(index, data, words) {
            const ids = new Set();

            words.forEach(word => {
                if (index[word]) {
                    index[word].forEach(id => ids.add(id));
                }
            });

            if (ids.size === 0) return data;
            return data.filter(item => ids.has(item.id));
        }

        // ===== メイン =====
        fetch("q_and_a_data.json")
            .then(res => res.json())
            .then(data => {
                if (!cachedIndex) {
                    cachedIndex = buildIndex(data);
                }
                runSearch(data, cachedIndex);
            });

        function runSearch(data, index) {
            const words = query.split(" ").filter(Boolean);
            const candidates = getCandidates(index, data, words);

            const results = candidates.map(item => {
                let score = 0;

                if (item.questions.some(q => q.toLowerCase() === query)) score += 10;
                if (item.search_text.includes(query)) score += 5;

                item.questions.forEach(q => {
                    if (q.toLowerCase().includes(query)) score += 3;
                });

                words.forEach(word => {
                    if (item.search_text.includes(word)) score += 1;
                    score += typoScore(word, item.search_text);
                    score += ngramScore(word, item.search_text);
                });

                if (item.synonyms) {
                    item.synonyms.forEach(s => {
                        words.forEach(word => {
                            if (s.includes(word)) score += 2;
                        });
                    });
                }

                score *= item.priority || 1;

                return { ...item, score };
            })
                .filter(i => i.score > 0)
                .sort((a, b) => b.score - a.score);

            render(results, words, data);
        }

        // ===== 表示 =====
        function render(results, words, allData) {
            aiBox.innerHTML = "";
            resultsBox.innerHTML = "";

            if (results.length === 0) {
                resultsBox.innerHTML = "No results found";
                return;
            }

            const top = results[0];

            aiBox.innerHTML = `
        <div class="ai-answer">
            <div class="ai-label">AI Answer</div>
            <div id="typing" class="ai-text"></div>
        </div>
    `;

            // ★ アニメーション実行
            const typingEl = document.getElementById("typing");
            typeText(typingEl, top.answer);

            results.forEach(item => {
                const el = document.createElement("div");
                el.className = "result";

                el.innerHTML = `
            <div class="result-title">${highlight(item.questions[0], words)}</div>
            <div class="result-desc">${highlight(item.description, words)}</div>
        `;

                resultsBox.appendChild(el);
            });
        }
    </script>

</body>

</html>
