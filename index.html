<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Search AI</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .container {
            text-align: center;
        }

        #text {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 30px;
            height: 40px;
        }

        .search-box {
            width: 400px;
            max-width: 80vw;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 999px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }

        .search-box:focus {
            border-color: #888;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="text"></div>
        <input class="search-box" type="text" placeholder="Search...">
    </div>

    <script>
        // ★ここを書き換えるだけで文言変更OK
        const phrases = [
            "Ask anything",
            "Learn smarter",
            "Attack stronger"
        ];

        const textEl = document.getElementById("text");

        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeLoop() {
            const currentPhrase = phrases[phraseIndex];

            if (!isDeleting) {
                // 文字追加
                textEl.textContent = currentPhrase.slice(0, charIndex + 1);
                charIndex++;

                if (charIndex === currentPhrase.length) {
                    // 表示完了 → 1秒待機して削除開始
                    isDeleting = true;
                    setTimeout(typeLoop, 1000);
                    return;
                }
            } else {
                // 文字削除
                textEl.textContent = currentPhrase.slice(0, charIndex - 1);
                charIndex--;

                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                }
            }

            setTimeout(typeLoop, isDeleting ? 50 : 80);
        }

        typeLoop();
    </script>

</body>

</html>
