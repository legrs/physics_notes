<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Physics AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* 👇 タイピングテキスト（等幅フォント） */
        #text {
            font-size: 28px;
            margin-bottom: 30px;
            height: 40px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        .search-wrapper {
            display: flex;
            gap: 10px;
        }

        .search-box {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 999px;
            border: 1px solid #ddd;
            outline: none;
        }

        .search-box:focus {
            border-color: #888;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }

        .search-button {
            padding: 12px 18px;
            border: none;
            border-radius: 999px;
            background: #000;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .search-button:active {
            opacity: 0.8;
        }

        /* モード選択 */
        .mode-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 12px;
        }

        .link-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .mode-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .mode-btn.active {
            border-color: #000;
            color: #000;
            background: #f5f5f5;
        }

        .mode-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="text"></div>

        <div class="search-wrapper">
            <input id="search" class="search-box" type="text" placeholder="Search...">
            <button id="btn" class="search-button">Search</button>
        </div>

        <div class="mode-row">
            <button class="mode-btn" data-mode="auto">Auto</button>
            <button class="mode-btn" data-mode="fast">Fast</button>
            <button class="mode-btn" data-mode="pro">Pro</button>
            <button class="mode-btn" data-mode="ultra">Ultra</button>
            <a href="https://legrs.github.io/physics_notes/electromagnetism.pdf" target="_blank" rel="noopener"
                class="link-btn" style="text-decoration: none;">Note</a>

        </div>
    </div>

    <script>
        // ===== テキスト（ここ編集するだけ）=====
        const phrases = [
            "Ask anything",
            "Learn smarter",
            "Attack stronger",
            "エネルギーの流れに着目する。",
            "こういう教員のテイストではない。",
            "式はいいんだ。物理を語ってくれ。",
            "地に足のついたサイエンスをやれ。",
            "まだ若葉マークが付いている。",
            "式ができたら物理的な解釈を。"
        ];

        const textEl = document.getElementById("text");

        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            textEl.textContent = phrases[0];
        } else {
            let phraseIndex = 0;
            let charIndex = 0;
            let isDeleting = false;

            function typeLoop() {
                const current = phrases[phraseIndex];

                if (!isDeleting) {
                    textEl.textContent = current.slice(0, charIndex + 1);
                    charIndex++;

                    if (charIndex === current.length) {
                        isDeleting = true;
                        setTimeout(typeLoop, 1000);
                        return;
                    }
                } else {
                    textEl.textContent = current.slice(0, charIndex - 1);
                    charIndex--;

                    if (charIndex === 0) {
                        isDeleting = false;
                        phraseIndex = (phraseIndex + 1) % phrases.length;
                    }
                }

                setTimeout(typeLoop, isDeleting ? 50 : 80);
            }

            typeLoop();
        }

        // ===== モード選択 =====
        const modeBtns = document.querySelectorAll('.mode-btn');
        const modeParam = new URLSearchParams(location.search).get('mode');
        let currentMode = modeParam || localStorage.getItem('search_mode') || 'auto';

        function applyMode(mode) {
            currentMode = mode;
            localStorage.setItem('search_mode', mode);
            modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        }

        applyMode(currentMode);

        modeBtns.forEach(btn => {
            if (!btn.disabled) {
                btn.addEventListener('click', () => applyMode(btn.dataset.mode));
            }
        });

        // ===== 検索処理 =====
        const input = document.getElementById("search");
        const button = document.getElementById("btn");

        function goSearch() {
            const query = input.value.trim();
            if (!query) return;
            const url = `https://legrs.github.io/physics_notes/search.html?q=${encodeURIComponent(query)}&mode=${currentMode}`;
            window.location.href = url;
        }

        // Enterキー対応
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.isComposing) {
                goSearch();
            }
        });

        // ボタン対応（スマホ）
        button.addEventListener("click", goSearch);
    </script>

</body>

</html>
